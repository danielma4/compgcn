# Relation-prediction model trained with 30% holdout (70% observed context).
# No CV — single run, saved to checkpoints/hide_thirty/.
#
# Usage:
#     python run.py --config config/brick_h30.yaml

name:        hide_thirty/rel_pred_mortar
dataset:     brick_mortar_h30
model:       compgcn
score_func:  distmult
opn:         corr
node_feat:   type
ent_weight:  1.0
rel_weight:  1.0
hard_neg:    0
hard_neg_weight: 1.0
beta:        0.5

# Graph / embedding sizes
gcn_layer:   2
init_dim:    100
gcn_dim:     200
embed_dim:   200
num_bases:   -1

# Optimisation
batch_size:  128
max_epochs:  500
lr:          0.001
l2:          0.0
lbl_smooth:  0.1
gamma:       40.0

# Regularisation / dropout
dropout:     0.1
hid_drop:    0.3
hid_drop2:   0.3
feat_drop:   0.3

# Misc
gpu:         '0'
seed:        41504
num_workers: 10
cv_alloc:    5              # set to 5 to re-enable 5-allocation CV
cv_seeds:    1              # set to 3 to re-enable 3 seeds per allocation
wandb_disabled: true
